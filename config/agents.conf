# Global agent registry for command scripts.
#
# Command-specific areas decide which agent they use in their own directory
# configs. This file defines each agent's default model/effort and the allowed
# model/effort values for overrides.
#
# Reader: scripts/agents/agents_config.sh.
# Consumers:
#   - /delegate: scripts/delegate/codex_implement.sh, codex_review.sh
#   - clean-fix: scripts/clean-fix/agent-assignments.conf via agent_assignments.sh
#
# model/effort may be left empty to fall through to the agent CLI default.

[codex]
model=gpt-5.6-sol
effort=

[codex.models]
# Generated by scripts/agents/sync_codex_catalog.sh.
gpt-5.6-sol
gpt-5.6-terra
gpt-5.6-luna
gpt-5.5
gpt-5.4
gpt-5.4-mini
gpt-5.3-codex-spark

[codex.efforts]
none
minimal
low
medium
high
xhigh

[claude]
model=sonnet
effort=max

[claude.models]
claude-fable-5
claude-opus-4-8
claude-sonnet-5
claude-haiku-4-5
claude-haiku-4-5-20251001
fable
opus
sonnet

[claude.efforts]
low
medium
high
xhigh
max

# ── major function → family: the switch ──
[assignments]
delegate=codex
cli=codex
cleanfix=codex
ask_a_friend=codex
team_review=codex
api_review=codex
module_review=codex

# ── delegate (/plan:delegate) ──
[delegate.codex]
implementation=gpt-5.6-sol:high
review=gpt-5.6-sol:high
mechanical=gpt-5.6-sol:medium
escalation=gpt-5.6-sol:xhigh

[delegate.claude]
implementation=opus:max
review=opus:max
mechanical=sonnet:medium
escalation=fable:max

# ── cli (~/.zshrc aliases via scripts/cli_agent/cli_agent.sh) ──
[cli.codex]
style_fix_review=gpt-5.6-sol:high    # alias: review
commit_prep=gpt-5.6-sol:high         # aliases: commit_no, commit_yes
merge_branch=gpt-5.6-sol:high        # alias: merge
interactive=gpt-5.6-sol:high         # alias: code (REPL)

[cli.claude]
style_fix_review=opus:high
commit_prep=sonnet:high
merge_branch=sonnet:high
interactive=opus:max

# ── cleanfix (launchd style pipeline) ──
[cleanfix.codex]
style_eval=gpt-5.6-sol:xhigh
style_eval_review=gpt-5.6-sol:xhigh
style_fix=gpt-5.6-sol:xhigh
report=gpt-5.6-sol:medium

[cleanfix.claude]
style_eval=opus:max
style_eval_review=opus:max
style_fix=opus:max
report=sonnet:medium

# ── ask_a_friend ──
[ask_a_friend.codex]
consultation=gpt-5.6-sol:high
implementation=gpt-5.6-sol:high

[ask_a_friend.claude]
consultation=opus:max
implementation=opus:max

# ── review commands (/team_review, /api_review, /module_review) ──
[team_review.codex]
expert=gpt-5.6-sol:high          # 3-5 parallel dimension reviewers

[team_review.claude]
expert=opus:max

[api_review.codex]
reviewer=gpt-5.6-sol:high        # 5 parallel inventory/finding agents
adversary=gpt-5.6-sol:high       # 2 stress-test agents

[api_review.claude]
reviewer=opus:max
adversary=opus:max

[module_review.codex]
reviewer=gpt-5.6-sol:high        # pass 1 structure + pass 2 over-large files
validation=gpt-5.6-sol:medium    # pass 3 doc-vs-code validation

[module_review.claude]
reviewer=opus:max
validation=sonnet:medium

# ── validation catalogs: agent=comma-separated valid efforts ──
[codex.agents]
# Generated by scripts/agents/sync_codex_catalog.sh — do not hand-edit.
gpt-5.6-sol=low,medium,high,xhigh,max,ultra
gpt-5.6-terra=low,medium,high,xhigh,max,ultra
gpt-5.6-luna=low,medium,high,xhigh,max
gpt-5.5=low,medium,high,xhigh
gpt-5.4=low,medium,high,xhigh
gpt-5.4-mini=low,medium,high,xhigh
gpt-5.3-codex-spark=low,medium,high,xhigh

[claude.agents]
# Hand-maintained. Claude agent names are the CLI's short aliases.
fable=low,medium,high,xhigh,max
opus=low,medium,high,xhigh,max
sonnet=low,medium,high,xhigh,max
