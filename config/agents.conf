# Default model + reasoning effort per agent for agent-driven commands.
#
# Sibling to scripts/clean-fix/agent-models.conf: that file is the ALLOWLIST
# (every model permitted per agent); this file picks the ONE model + effort each
# agent actually runs with. Single source of truth, read by:
#   - /delegate  (scripts/delegate/codex_implement.sh, codex_review.sh) — codex only
#   - clean-fix  (style_eval / style_fix) when that scope leaves model/effort empty
#
# Reader: scripts/agents_config.sh (agents_config_model / agents_config_effort).
#
# model  — must be listed under the matching section in agent-models.conf;
#          clean-fix validates the resolved value against that allowlist.
#          Leave empty to fall through to the agent's own CLI default.
# effort — codex:  none|minimal|low|medium|high|xhigh   (ceiling = xhigh)
#          claude: low|medium|high|xhigh|max            (ceiling = max)

[codex]
model=gpt-5.5
effort=xhigh

[claude]
model=opus
effort=max
