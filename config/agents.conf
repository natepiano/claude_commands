# Global agent registry for command scripts.
#
# Command-specific areas decide which agent they use in their own directory
# configs. This file defines each agent's default model/effort and the allowed
# model/effort values for overrides.
#
# Reader: scripts/agents/agents_config.sh.
# Consumers:
#   - /delegate: scripts/delegate/codex_implement.sh, codex_review.sh
#   - clean-fix: scripts/clean-fix/agent-assignments.conf via agent_assignments.sh
#
# model/effort may be left empty to fall through to the agent CLI default.

[codex]
model=gpt-5.5
effort=

[codex.models]
gpt-5.5
gpt-5.4
gpt-5.4-mini
gpt-5.3-codex-spark

[codex.efforts]
none
minimal
low
medium
high
xhigh

[claude]
model=sonnet
effort=max

[claude.models]
claude-fable-5
claude-opus-4-8
claude-sonnet-5
claude-haiku-4-5
claude-haiku-4-5-20251001
fable
opus
sonnet

[claude.efforts]
low
medium
high
xhigh
max
