# Nightly build configuration
# All paths are relative to ~/rust/

[settings]
warmup_timeout=60
warmup_run_seconds=1

[style_eval]
mode=codex
max_new_findings=2

[exclude]
# Projects to skip during nightly build (directory names under ~/rust/)
bevy
tracy
blender
hana videos
hanadocs
rust-template
gltf-ibl-sampler-egui
bevy_rich_text3d
bevy_mesh_outline
bevy_mesh_outline_benchmark
bevy_mod_outline
# Workspace repos whose members are targeted individually via [workspace_members]
bevy_hana

[workspace_members]
# project_name=workspace_dir/member_subpath[:package_name]
# project_name is the history key (worktree becomes <project_name>_style_fix).
# member_subpath is relative to the workspace directory.
# :package_name is optional; defaults to the final segment of member_subpath.
bevy_diegetic=bevy_hana/crates/bevy_diegetic

[cargo_run]
# name=relative/path/to/Cargo.toml
nateroids=nateroids/Cargo.toml
hana=hana/crates/hana/Cargo.toml

[examples]
# name=relative/path/to/Cargo.toml:example_name
bevy_panorbit_camera_extras=bevy_panorbit_camera/Cargo.toml:extras
