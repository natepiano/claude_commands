# Governs which agent runs the interactive CLI aliases defined in ~/.zshrc:
# review, commit_no, commit_yes, merge, code.
#
# Model/effort defaults and allowlists live in the global registry,
# ~/.claude/config/agents.conf. Leave model/effort empty here to use that
# agent's global defaults; set a non-empty value here only to override it
# for these aliases specifically.
#
# Change with `/cli_agent <codex|claude> [model] [effort]`.

[cli_agent]
agent=claude
model=
effort=
