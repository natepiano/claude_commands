# Clean-fix build configuration
# All paths are relative to ~/rust/

[settings]
warmup_timeout=60
warmup_run_seconds=1

[style_eval]
mode=claude
model=gpt-5.5
max_new_findings=2

[style_fix]
# agent_timeout_secs: hard cap on a single project's style-fix agent run.
#   Was 3600 (1h); bumped to 7200 (2h) after the May 18 nateroids timeout
#   left an orphan _style_fix stub behind. Big projects with many findings
#   can legitimately take >60min.
# post_summary_grace_secs: after the agent prints "## Fix Summary", how long
#   to wait for it to finalize before sending SIGTERM.
# heartbeat_interval_secs: cadence of `[progress] phase=agent-running` lines
#   in the log.
agent_timeout_secs=7200
post_summary_grace_secs=600
heartbeat_interval_secs=60

[exclude]
# Projects to skip during clean-fix build (directory names under ~/rust/)
bevy
bevy-0.19.0-rc.2
tracy
blender
hana videos
hanadocs
rust-template
gltf-ibl-sampler-egui
bevy_rich_text3d
bevy_mesh_outline
bevy_mesh_outline_benchmark
bevy_mod_outline
bevy_enhanced_input
# Workspace repos whose members are targeted individually via [workspace_members]
bevy_hana

[workspace_members]
# project_name=workspace_dir/member_subpath[:package_name]
# project_name is the history key (worktree becomes <project_name>_style_fix).
# member_subpath is relative to the workspace directory.
# :package_name is optional; defaults to the final segment of member_subpath.
#CLEAN_FIX_SKIP# bevy_diegetic=bevy_hana/crates/bevy_diegetic
#CLEAN_FIX_SKIP# bevy_lagrange=bevy_hana/crates/bevy_lagrange
#CLEAN_FIX_SKIP# fairy_dust=bevy_hana/crates/fairy_dust

[cargo_run]
# name=relative/path/to/Cargo.toml
nateroids=nateroids/Cargo.toml
hana=hana/crates/hana/Cargo.toml

[examples]
# name=relative/path/to/Cargo.toml:example_name
