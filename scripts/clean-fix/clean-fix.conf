# Clean-fix build configuration
# All paths are relative to ~/rust/
#
# Allowlist model: nothing runs unless it is listed. There is no deny list.
#   [build]    -- targets to clean/build/mend nightly
#   [projects] -- projects to style eval/review/fix (identity + history key)
#   [active_checkout] -- optional: redirect a [projects] entry's eval/fix to a
#                        worktree checkout while keeping its identity/history
# [build] and [projects] are independent allowlists, but this config keeps the
# same project identities active in both phases unless temporarily skipped.
# Redirected worktrees may also appear in [build] so those checkouts build too;
# they should not be duplicated in [projects] unless they are intentionally a
# separate style identity.

[settings]
warmup_timeout=60
warmup_run_seconds=1

[style_eval]
# Agent selection lives in agent-assignments.conf. This section only contains
# style-eval tunables.
max_new_findings=2
# eval_unit_quota: max LLM-reviewed units per eval run. Bounds a single run to
#   minutes instead of a full 45-unit sweep; coverage amortizes across runs.
#   Pre-filter skips are free and do not count against the quota.
# eval_ttl_days: how long a recorded unit verdict suppresses re-review. A unit
#   is due when it was never reviewed, its guideline file changed since the
#   last review, or the verdict is older than the TTL AND the project's code
#   state changed since it was recorded — a dormant project never re-expires.
eval_unit_quota=10
eval_ttl_days=1

[style_fix]
# Agent selection lives in agent-assignments.conf. This section only contains
# style-fix tunables.
# agent_timeout_secs: hard cap on a single project's style-fix agent run.
#   Was 3600 (1h); bumped to 7200 (2h) after the May 18 nateroids timeout
#   left an orphan _style_fix stub behind. Big projects with many findings
#   can legitimately take >60min.
# post_summary_grace_secs: after the agent prints "## Fix Summary", how long
#   to wait for it to finalize before sending SIGTERM.
# heartbeat_interval_secs: cadence of `[progress] phase=agent-running` lines
#   in the log.
agent_timeout_secs=7200
post_summary_grace_secs=600
heartbeat_interval_secs=60

[project_env]
# Per-project environment applied to the clean/build/mend pass, the style-fix
# agent, and the style-fix build-gate. Format: <project>=<KEY=VALUE [KEY=VALUE]>.
# cargo-mend links rustc internals (#![feature(rustc_private)]); RUSTC_BOOTSTRAP=1
# unlocks that on the stable toolchain — the same trick as the `imend` alias
# (RUSTC_BOOTSTRAP=1 cargo +stable install). No nightly or rustc-dev needed.
cargo-mend=RUSTC_BOOTSTRAP=1

[build]
# Opt-in: targets under ~/rust/ to clean/build/mend nightly.
# May be primary repos, workspace members, or worktree checkouts — each checkout
# has its own working tree and target/, so building both is independent.
bevy_brp
bevy_hana/crates/bevy_catenary
bevy_hana/crates/bevy_clerestory
bevy_hana/crates/bevy_diegetic
bevy_diegetic_batching
bevy_hana
bevy_hana/crates/bevy_kana
bevy_hana/crates/bevy_lagrange
bevy_lagrange_device_sensitivity
bevy_lagrange_flycam
bevy_hana/crates/bevy_liminal
bevy_hana/crates/bevy_valence
cargo-mend
cargo-port
bevy_hana/crates/fairy_dust
hana
nateroids
obsidian_knife
bevy_hana/crates/hana_voice_sidecar
test_rename

[projects]
# Opt-in: projects to style eval/review/fix. Two forms:
#   <dir>            evaluate the whole directory (single crate, or --workspace)
#   <dir>/<subpath>  evaluate one workspace member crate inside <dir>
# <dir> may be a primary repo OR a worktree checkout; the same rules apply. A
# project's history key and _style_fix dir name come from the entry's last path
# segment (e.g. cargo-port, or bevy_diegetic for a member).
# To evaluate/fix a worktree instead of the entry's own path while keeping the
# same history, add a redirect under [active_checkout] — do not change the line
# here.
bevy_brp
bevy_hana/crates/bevy_catenary
bevy_hana/crates/bevy_clerestory
bevy_hana/crates/bevy_diegetic
bevy_hana
bevy_hana/crates/bevy_kana
bevy_hana/crates/bevy_lagrange
bevy_lagrange_device_sensitivity
bevy_hana/crates/bevy_liminal
bevy_hana/crates/bevy_valence
cargo-mend
cargo-port
bevy_hana/crates/fairy_dust
hana
nateroids
obsidian_knife
bevy_hana/crates/hana_voice_sidecar
test_rename

[active_checkout]
# Optional redirects: <projects-entry> = <checkout-path-relative-to-~/rust>.
# When a [projects] entry appears on the left, style eval/review/fix reads the
# checkout on the right instead of the entry's own path — used to point work at
# a worktree (e.g. one made by /make_a_worktree) while the project's identity and
# history stay under the [projects] entry. Absent = use the entry's own path.
# The right side mirrors the entry's shape: a standalone redirect is a bare dir,
# a member redirect keeps the same subpath under the worktree dir. Examples:
#   cargo-port = cargo-port_do_some_work
#   bevy_hana/crates/bevy_diegetic = bevy_diegetic_do_some_work/crates/bevy_diegetic
bevy_hana/crates/bevy_diegetic = bevy_diegetic_batching/crates/bevy_diegetic
bevy_hana/crates/bevy_lagrange = bevy_lagrange_flycam/crates/bevy_lagrange

[cargo_run]
# name=relative/path/to/Cargo.toml
nateroids=nateroids/Cargo.toml
hana=hana/crates/hana/Cargo.toml

[examples]
# name=relative/path/to/Cargo.toml:example_name
