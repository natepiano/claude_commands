# Clean-fix build configuration
# All paths are relative to ~/rust/
#
# Allowlist model: nothing runs unless it is listed. There is no deny list.
#   [build]   -- directories to clean/build/mend nightly
#   [targets] -- directories to style eval/review/fix
# The two lists are independent — a directory may appear in one, both, or neither.

[settings]
warmup_timeout=60
warmup_run_seconds=1

[style_eval]
mode=off
model=gpt-5.5
max_new_findings=2

[style_fix]
# agent_timeout_secs: hard cap on a single project's style-fix agent run.
#   Was 3600 (1h); bumped to 7200 (2h) after the May 18 nateroids timeout
#   left an orphan _style_fix stub behind. Big projects with many findings
#   can legitimately take >60min.
# post_summary_grace_secs: after the agent prints "## Fix Summary", how long
#   to wait for it to finalize before sending SIGTERM.
# heartbeat_interval_secs: cadence of `[progress] phase=agent-running` lines
#   in the log.
agent_timeout_secs=7200
post_summary_grace_secs=600
heartbeat_interval_secs=60

[project_env]
# Per-project environment applied to the clean/build/mend pass, the style-fix
# agent, and the style-fix build-gate. Format: <project>=<KEY=VALUE [KEY=VALUE]>.
# cargo-mend links rustc internals (#![feature(rustc_private)]); RUSTC_BOOTSTRAP=1
# unlocks that on the stable toolchain — the same trick as the `imend` alias
# (RUSTC_BOOTSTRAP=1 cargo +stable install). No nightly or rustc-dev needed.
cargo-mend=RUSTC_BOOTSTRAP=1

[build]
# Opt-in: directories under ~/rust/ to clean/build/mend nightly.
# May be primary repos or worktree checkouts (e.g. *_bevy_update) — each
# checkout has its own working tree and target/, so building both is independent.
cargo-mend
cargo-port
hana
nateroids
obsidian_knife
bevy_brp
bevy_catenary
bevy_kana
bevy_liminal
bevy_window_manager
bevy_brp_bevy_update
bevy_catenary_bevy_update
bevy_hana_bevy_update
bevy_kana_bevy_update
bevy_liminal_bevy_update
bevy_window_manager_bevy_update

[targets]
# Opt-in: directories to style eval/review/fix. Two forms:
#   <dir>            evaluate the whole directory (single crate, or --workspace)
#   <dir>/<subpath>  evaluate one workspace member crate inside <dir>
# <dir> may be a primary repo OR a worktree checkout (e.g. *_bevy_update); the
# same rules apply. A member's history key and _style_fix dir name come from the
# last path segment (e.g. bevy_diegetic).
nateroids
obsidian_knife
cargo-mend
cargo-port
hana
bevy_brp_bevy_update
bevy_catenary_bevy_update
bevy_kana_bevy_update
bevy_liminal_bevy_update
bevy_window_manager_bevy_update
bevy_hana_bevy_update/crates/bevy_diegetic
bevy_hana_bevy_update/crates/bevy_lagrange
bevy_hana_bevy_update/crates/fairy_dust

[cargo_run]
# name=relative/path/to/Cargo.toml
nateroids=nateroids/Cargo.toml
hana=hana/crates/hana/Cargo.toml

[examples]
# name=relative/path/to/Cargo.toml:example_name
